name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript check (server)
        run: npx tsc --noEmit --project server/tsconfig.json

      - name: TypeScript check (web)
        run: npx tsc --noEmit --project web/tsconfig.json

      - name: Build web
        run: npm run build --workspace=web

      - name: Build server
        run: npm run build --workspace=server

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t myta-personal .
