# HTTPS via Caddy reverse proxy
# Usage: docker-compose -f docker-compose.yml -f docker-compose.https.yml up
services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - myta
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
